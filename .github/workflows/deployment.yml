name: Deploy .NET 9 API to IIS

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: windows-latest

    env:
      DOTNET_VERSION: "9.0.304"
      PROJECT_PATH: "./simple-net-core-api/simple-net-core-api.csproj"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore "${{ env.PROJECT_PATH }}"

      - name: Build
        run: dotnet build "${{ env.PROJECT_PATH }}" --configuration Release --no-restore

      - name: Publish
        run: |
          dotnet publish `
            "${{ env.PROJECT_PATH }}" `
            --configuration Release `
            --no-build `
            --output publish
        shell: powershell

      - name: Deploy via MSDeploy
        run: |
          $msdeploy = "${env:ProgramFiles}\IIS\Microsoft Web Deploy V3\msdeploy.exe"

          & $msdeploy `
            -verb:sync `
            -source:contentPath="publish" `
            -dest:contentPath="${{ secrets.IIS_SITE_NAME }}",computerName="https://${{ secrets.IIS_SERVER }}:8172/msdeploy.axd",userName="${{ secrets.IIS_USERNAME }}",password="${{ secrets.IIS_PASSWORD }}",authType="Basic" `
            -enableRule:AppOffline `
            -allowUntrusted
        shell: powershell
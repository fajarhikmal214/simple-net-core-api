name: Deploy .NET 9 API to IIS

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: windows-latest

    env:
      DOTNET_VERSION: "9.0.304"
      PROJECT_PATH: "./simple-net-core-api/simple-net-core-api.csproj"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore "${{ env.PROJECT_PATH }}"
        shell: powershell

      - name: Build
        run: dotnet build "${{ env.PROJECT_PATH }}" --configuration Release --no-restore
        shell: powershell

      - name: Publish
        run: |
          dotnet publish `
            "${{ env.PROJECT_PATH }}" `
            --configuration Release `
            --no-build `
            --output "${{ github.workspace }}\publish"
        shell: powershell

      - name: Verify Publish Output
        run: |
          Write-Host "Publish folder:"
          Get-ChildItem "${{ github.workspace }}\publish"
        shell: powershell

      - name: Install Web Deploy
        run: |
          choco install webdeploy -y
        shell: powershell

      - name: Verify Web Deploy
        run: |
          Get-ChildItem "C:\Program Files\IIS" -Recurse -Filter msdeploy.exe
        shell: powershell

      - name: Deploy to IIS
        run: |
          $msdeploy = Get-ChildItem `
            "C:\Program Files\IIS" `
            -Recurse `
            -Filter msdeploy.exe |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $msdeploy) {
            throw "msdeploy.exe not found"
          }

          Write-Host "Using: $msdeploy"

          & $msdeploy `
            -verb:sync `
            -source:contentPath="${{ github.workspace }}\publish" `
            -dest:contentPath="${{ secrets.IIS_SITE_NAME }}",computerName="https://${{ secrets.IIS_SERVER }}:8172/msdeploy.axd",userName="${{ secrets.IIS_USERNAME }}",password="${{ secrets.IIS_PASSWORD }}",authType="Basic" `
            -enableRule:AppOffline `
            -allowUntrusted

        shell: powershell
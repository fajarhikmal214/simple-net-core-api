name: Deploy .NET 9 API to IIS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: windows-latest

    env:
      DOTNET_VERSION: "9.0.304"
      PROJECT_PATH: "./simple-net-core-api/simple-net-core-api.csproj"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        shell: powershell
        run: |
          dotnet restore "${{ env.PROJECT_PATH }}"

      - name: Build application
        shell: powershell
        run: |
          dotnet build "${{ env.PROJECT_PATH }}" `
            --configuration Release `
            --no-restore

      - name: Publish to IIS via MSDeploy
        shell: powershell
        run: |
          dotnet msbuild "${{ env.PROJECT_PATH }}" `
            /t:Build `
            /p:Configuration=Release `
            /p:DeployOnBuild=true `
            /p:PublishProfile=Development `
            /p:MSDeployServiceURL="${{ secrets.IIS_SERVER }}" `
            /p:DeployIisAppPath="${{ secrets.IIS_SITE_NAME }}" `
            /p:UserName="${{ secrets.IIS_USERNAME }}" `
            /p:Password="${{ secrets.IIS_PASSWORD }}" `
            /p:AllowUntrustedCertificate=true

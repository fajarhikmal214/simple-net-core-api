name: Deploy .NET 9 API to IIS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: windows-latest

    env:
      DOTNET_VERSION: "9.0.304"
      PROJECT_PATH: "./simple-net-core-api/simple-net-core-api.csproj"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        shell: powershell
        run: |
          dotnet restore "${{ env.PROJECT_PATH }}"

      - name: Build application
        shell: powershell
        run: |
          dotnet build "${{ env.PROJECT_PATH }}" `
            --configuration Release `
            --no-restore

      - name: Publish application
        shell: powershell
        run: |
          dotnet publish "${{ env.PROJECT_PATH }}" `
            --configuration Release `
            --no-build `
            --output "${{ github.workspace }}\publish"

      - name: Install Web Deploy
        shell: powershell
        run: |
          choco install webdeploy -y

      - name: Deploy to IIS
        shell: powershell
        run: |
          $msdeploy = Get-ChildItem `
            "C:\Program Files\IIS" `
            -Recurse `
            -Filter msdeploy.exe |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $msdeploy) {
            throw "msdeploy.exe not found"
          }

          $publishPath = "${{ github.workspace }}\publish"

          Write-Host "Using: $msdeploy"
          Write-Host "Server: ${{ secrets.IIS_SERVER }}"
          Write-Host "Site: ${{ secrets.IIS_SITE_NAME }}"
          Write-Host "Publish Path: $publishPath"

          $dest = "contentPath=${{ secrets.IIS_SITE_NAME }},computerName=${{ secrets.IIS_SERVER }},userName=${{ secrets.IIS_USERNAME }},password=${{ secrets.IIS_PASSWORD }},authType=NTLM,includeAcls=False"

          & $msdeploy `
            "-verb:sync" `
            "-source:contentPath=$publishPath" `
            "-dest:$dest" `
            "-enableRule:AppOffline"

          if ($LASTEXITCODE -ne 0) {
            throw "MSDeploy failed with exit code $LASTEXITCODE"
          }

      - name: Health Check
        shell: powershell
        run: |
          Invoke-WebRequest `
            -Uri "${{ secrets.IIS_SERVER }}/simple-net-core-api/healthcheck" `
            -UseBasicParsing